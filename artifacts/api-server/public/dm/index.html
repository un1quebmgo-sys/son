<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Direct messages — coming son. 😭😭😭😭">
    <title>DMs - coming son. 😭😭😭😭</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@500;600;700;800;900&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <style>
      .dm-layout {
        display: grid;
        grid-template-columns: 280px 1fr;
        min-height: calc(100vh - 76px);
      }
      .dm-sidebar {
        border-right: 1px solid var(--border);
        background: var(--paper);
        display: flex;
        flex-direction: column;
      }
      .dm-sidebar-header {
        padding: 20px 20px 14px;
        border-bottom: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .dm-sidebar-header h2 {
        margin: 0;
        font-family: Poppins, Inter, sans-serif;
        font-size: 18px;
        font-weight: 800;
      }
      .dm-search {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        font-size: 13px;
        background: var(--paper-soft);
        color: var(--ink);
      }
      .dm-search:focus {
        outline: 2px solid var(--ink);
        outline-offset: -1px;
      }
      .dm-contact-list {
        flex: 1;
        overflow-y: auto;
        padding: 8px 0;
      }
      .dm-contact {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 20px;
        cursor: pointer;
        border: none;
        background: none;
        width: 100%;
        text-align: left;
        color: var(--ink);
        font-size: 14px;
      }
      .dm-contact:hover,
      .dm-contact.is-active {
        background: var(--paper-soft);
      }
      .dm-contact.is-active {
        background: rgba(10, 33, 56, 0.07);
      }
      .dm-contact-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: var(--inverse);
        color: var(--paper);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Poppins, Inter, sans-serif;
        font-weight: 700;
        font-size: 13px;
        flex: 0 0 36px;
      }
      .dm-contact-info {
        flex: 1;
        min-width: 0;
      }
      .dm-contact-handle {
        font-weight: 600;
        font-size: 13px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .dm-contact-preview {
        font-size: 12px;
        color: var(--ink-soft);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-top: 1px;
      }
      .dm-badge {
        background: var(--inverse);
        color: var(--paper);
        font-size: 10px;
        font-weight: 700;
        border-radius: 99px;
        padding: 2px 7px;
        flex: 0 0 auto;
      }
      .dm-thread {
        display: flex;
        flex-direction: column;
        height: calc(100vh - 76px);
      }
      .dm-thread-header {
        padding: 18px 28px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 12px;
        background: var(--paper);
        flex: 0 0 auto;
      }
      .dm-thread-header h3 {
        margin: 0;
        font-size: 16px;
        font-weight: 700;
      }
      .dm-thread-header p {
        margin: 0;
        font-size: 12px;
        color: var(--ink-soft);
      }
      .dm-messages {
        flex: 1;
        overflow-y: auto;
        padding: 24px 28px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .dm-msg {
        display: flex;
        flex-direction: column;
        max-width: 68%;
      }
      .dm-msg.is-mine {
        align-self: flex-end;
        align-items: flex-end;
      }
      .dm-msg.is-theirs {
        align-self: flex-start;
      }
      .dm-msg-bubble {
        padding: 10px 14px;
        border-radius: 14px;
        font-size: 14px;
        line-height: 1.45;
        word-break: break-word;
      }
      .dm-msg.is-mine .dm-msg-bubble {
        background: var(--inverse);
        color: var(--paper);
        border-bottom-right-radius: 4px;
      }
      .dm-msg.is-theirs .dm-msg-bubble {
        background: var(--paper-soft);
        color: var(--ink);
        border-bottom-left-radius: 4px;
        border: 1px solid var(--border);
      }
      .dm-msg-meta {
        font-size: 11px;
        color: var(--ink-soft);
        margin-top: 4px;
        padding: 0 4px;
      }
      .dm-compose {
        padding: 16px 28px;
        border-top: 1px solid var(--border);
        background: var(--paper);
        flex: 0 0 auto;
        display: flex;
        gap: 10px;
        align-items: flex-end;
      }
      .dm-compose-input {
        flex: 1;
        resize: none;
        padding: 10px 14px;
        border: 1px solid var(--border);
        border-radius: 12px;
        font-size: 14px;
        line-height: 1.4;
        max-height: 120px;
        min-height: 42px;
        color: var(--ink);
        background: var(--paper-soft);
      }
      .dm-compose-input:focus {
        outline: 2px solid var(--ink);
        outline-offset: -1px;
      }
      .dm-send-btn {
        padding: 10px 18px;
        background: var(--inverse);
        color: var(--paper);
        border: none;
        border-radius: 10px;
        font-weight: 700;
        font-size: 14px;
        cursor: pointer;
        flex: 0 0 auto;
        align-self: flex-end;
      }
      .dm-send-btn:hover {
        opacity: 0.85;
      }
      .dm-empty {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        color: var(--ink-soft);
        padding: 40px;
        text-align: center;
      }
      .dm-empty-icon {
        font-size: 48px;
        line-height: 1;
      }
      .dm-empty h3 {
        margin: 0;
        font-size: 18px;
        color: var(--ink);
      }
      .dm-empty p {
        margin: 0;
        font-size: 14px;
        max-width: 280px;
      }
      .dm-gate {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        padding: 40px;
        text-align: center;
      }
      .dm-gate h2 {
        margin: 0;
        font-family: Poppins, Inter, sans-serif;
        font-size: 28px;
        font-weight: 800;
      }
      .dm-gate p {
        margin: 0;
        color: var(--ink-soft);
        max-width: 320px;
      }
      .dm-new-btn {
        margin-top: 4px;
        padding: 10px 20px;
        background: var(--inverse);
        color: var(--paper);
        border: none;
        border-radius: var(--radius);
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
        width: 100%;
        text-align: center;
      }
      .dm-new-btn:hover { opacity: 0.85; }
      @media (max-width: 680px) {
        .dm-layout {
          grid-template-columns: 1fr;
        }
        .dm-sidebar {
          border-right: none;
          border-bottom: 1px solid var(--border);
          max-height: 220px;
        }
        .dm-thread {
          height: auto;
          min-height: calc(100vh - 76px - 220px);
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="../" aria-label="coming son. 😭😭😭😭 home">
        <span class="brand-mark" aria-hidden="true">
          <img src="../assets/logo.webp" alt="logo" style="width:42px;height:42px;object-fit:cover;border-radius:8px;">
        </span>
        <span>coming son. 😭😭😭😭</span>
      </a>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="../#submit">Submit</a>
        <a href="../#feed">Feed</a>
        <a href="../gallery/">Gallery</a>
        <a href="../forums/">Forums</a>
        <a href="../dm/" aria-current="page">DMs</a>
        <a href="../admin/" hidden>Admin</a>
        <a href="../#profiles">Profiles</a>
        <a href="../#rules">Rules</a>
      </nav>
      <a class="join-button" href="../signup/">
        <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        Sign up
      </a>
    </header>

    <main id="top">
      <div class="dm-layout" id="dm-layout">
        <aside class="dm-sidebar" id="dm-sidebar">
          <div class="dm-sidebar-header">
            <h2>messages. 😭</h2>
            <input class="dm-search" id="dm-search" type="search" placeholder="Search users...">
          </div>
          <div class="dm-contact-list" id="dm-contact-list"></div>
          <div style="padding:12px 16px;border-top:1px solid var(--border)">
            <button class="dm-new-btn" id="dm-new-btn" type="button">+ New Message</button>
          </div>
        </aside>

        <div class="dm-thread" id="dm-thread">
          <div class="dm-empty" id="dm-empty-state">
            <div class="dm-empty-icon">💬</div>
            <h3>no messages yet. 😭</h3>
            <p>Pick a user from the list or start a new conversation.</p>
          </div>

          <div id="dm-active-thread" style="display:none;flex-direction:column;height:100%">
            <div class="dm-thread-header">
              <div class="dm-contact-avatar" id="dm-thread-avatar"></div>
              <div>
                <h3 id="dm-thread-handle"></h3>
                <p id="dm-thread-status"></p>
              </div>
            </div>
            <div class="dm-messages" id="dm-messages"></div>
            <form class="dm-compose" id="dm-compose-form">
              <textarea class="dm-compose-input" id="dm-compose-input" placeholder="Message..." rows="1" maxlength="500"></textarea>
              <button class="dm-send-btn" type="submit">Send</button>
            </form>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../config.js"></script>
    <script src="../backend.js"></script>
    <script>
      const DM_KEY = "son-meme-exchange-dm";
      const USER_KEY = "son-meme-exchange-current-user";
      const POSTS_KEY = "son-meme-exchange-posts";
      const FORUMS_KEY = "son-meme-exchange-forums";

      function getMe() {
        try { return JSON.parse(localStorage.getItem(USER_KEY)); } catch { return null; }
      }

      function normalizeHandle(h) {
        if (!h) return "@anonymous";
        return "@" + h.replace(/^@+/, "").replace(/\s+/g, "").toLowerCase() || "anonymous";
      }

      function initials(handle) {
        return handle.replace(/^@/, "").slice(0, 2).toUpperCase() || "SN";
      }

      function getDMs() {
        try { return JSON.parse(localStorage.getItem(DM_KEY)) || {}; } catch { return {}; }
      }

      function saveDMs(data) {
        localStorage.setItem(DM_KEY, JSON.stringify(data));
      }

      function convoKey(a, b) {
        return [normalizeHandle(a), normalizeHandle(b)].sort().join("~");
      }

      function getMessages(a, b) {
        const dms = getDMs();
        return dms[convoKey(a, b)] || [];
      }

      function sendMessage(from, to, body) {
        const dms = getDMs();
        const key = convoKey(from, to);
        if (!dms[key]) dms[key] = [];
        dms[key].push({ id: Date.now().toString(), from: normalizeHandle(from), to: normalizeHandle(to), body: body.trim(), ts: Date.now() });
        saveDMs(dms);
      }

      function getKnownUsers() {
        const me = getMe();
        const myHandle = normalizeHandle(me?.handle || "");
        const users = new Set();
        try {
          const posts = JSON.parse(localStorage.getItem(POSTS_KEY)) || [];
          posts.forEach(function(p) { if (p.author) users.add(normalizeHandle(p.author)); });
        } catch {}
        try {
          const threads = JSON.parse(localStorage.getItem(FORUMS_KEY)) || [];
          threads.forEach(function(t) {
            if (t.author) users.add(normalizeHandle(t.author));
            (t.messages || []).forEach(function(m) { if (m.author) users.add(normalizeHandle(m.author)); });
          });
        } catch {}
        const dms = getDMs();
        Object.keys(dms).forEach(function(key) {
          key.split("~").forEach(function(h) { users.add(h); });
        });
        users.delete(myHandle);
        users.delete("@anonymous");
        return [...users].sort();
      }

      function getLastMessage(myHandle, theirHandle) {
        const msgs = getMessages(myHandle, theirHandle);
        return msgs[msgs.length - 1] || null;
      }

      function getUnreadCount(myHandle, theirHandle) {
        const msgs = getMessages(myHandle, theirHandle);
        return msgs.filter(function(m) { return m.to === normalizeHandle(myHandle) && !m.read; }).length;
      }

      let activeContact = null;

      function renderContacts(filter) {
        const me = getMe();
        if (!me) return;
        const myHandle = normalizeHandle(me.handle);
        const list = document.getElementById("dm-contact-list");
        const users = getKnownUsers();
        const query = (filter || "").toLowerCase();
        const filtered = query ? users.filter(function(u) { return u.includes(query); }) : users;

        list.innerHTML = "";
        if (!filtered.length) {
          const empty = document.createElement("p");
          empty.style.cssText = "padding:16px 20px;font-size:13px;color:var(--ink-soft)";
          empty.textContent = query ? "No users found." : "No conversations yet. Submit memes or forum posts to discover users.";
          list.append(empty);
          return;
        }

        filtered.forEach(function(handle) {
          const last = getLastMessage(myHandle, handle);
          const unread = getUnreadCount(myHandle, handle);
          const btn = document.createElement("button");
          btn.className = "dm-contact" + (activeContact === handle ? " is-active" : "");
          btn.type = "button";

          const av = document.createElement("div");
          av.className = "dm-contact-avatar";
          av.textContent = initials(handle);
          av.style.background = stringToColor(handle);

          const info = document.createElement("div");
          info.className = "dm-contact-info";

          const hEl = document.createElement("div");
          hEl.className = "dm-contact-handle";
          hEl.textContent = handle;

          const prev = document.createElement("div");
          prev.className = "dm-contact-preview";
          prev.textContent = last ? last.body : "No messages yet";

          info.append(hEl, prev);
          btn.append(av, info);

          if (unread > 0) {
            const badge = document.createElement("span");
            badge.className = "dm-badge";
            badge.textContent = unread;
            btn.append(badge);
          }

          btn.addEventListener("click", function() { openConvo(handle); });
          list.append(btn);
        });
      }

      function stringToColor(str) {
        var hash = 0;
        for (var i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
        var colors = ["#07121e","#1a3a52","#2d5a8e","#3d7a8a","#4a6b5a","#6b4a8a","#8a4a6b","#4a4a8a"];
        return colors[Math.abs(hash) % colors.length];
      }

      function openConvo(handle) {
        const me = getMe();
        if (!me) return;
        activeContact = handle;
        renderContacts(document.getElementById("dm-search").value);

        const emptyState = document.getElementById("dm-empty-state");
        const activeThread = document.getElementById("dm-active-thread");
        emptyState.style.display = "none";
        activeThread.style.display = "flex";

        document.getElementById("dm-thread-avatar").textContent = initials(handle);
        document.getElementById("dm-thread-avatar").style.background = stringToColor(handle);
        document.getElementById("dm-thread-handle").textContent = handle;
        document.getElementById("dm-thread-status").textContent = "direct message";

        const myHandle = normalizeHandle(me.handle);
        const msgs = getMessages(myHandle, handle);

        const dms = getDMs();
        const key = convoKey(myHandle, handle);
        if (dms[key]) {
          dms[key].forEach(function(m) { if (m.to === myHandle) m.read = true; });
          saveDMs(dms);
        }

        const msgList = document.getElementById("dm-messages");
        msgList.innerHTML = "";

        if (!msgs.length) {
          const p = document.createElement("p");
          p.style.cssText = "color:var(--ink-soft);font-size:13px;text-align:center;margin-top:40px";
          p.textContent = "No messages yet. Say something! 😭";
          msgList.append(p);
        } else {
          msgs.forEach(function(m) {
            const isMine = normalizeHandle(m.from) === myHandle;
            const wrap = document.createElement("div");
            wrap.className = "dm-msg " + (isMine ? "is-mine" : "is-theirs");

            const bubble = document.createElement("div");
            bubble.className = "dm-msg-bubble";
            bubble.textContent = m.body;

            const meta = document.createElement("div");
            meta.className = "dm-msg-meta";
            meta.textContent = new Date(m.ts).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

            wrap.append(bubble, meta);
            msgList.append(wrap);
          });
          msgList.scrollTop = msgList.scrollHeight;
        }

        document.getElementById("dm-compose-input").focus();
      }

      function promptNewMessage() {
        const me = getMe();
        if (!me) {
          alert("Sign in first to send messages.");
          return;
        }
        const handle = prompt("Enter the @handle of the person you want to message:");
        if (!handle) return;
        const normalized = normalizeHandle(handle);
        if (normalized === normalizeHandle(me.handle)) { alert("You can't message yourself!"); return; }
        const dms = getDMs();
        const key = convoKey(me.handle, normalized);
        if (!dms[key]) { dms[key] = []; saveDMs(dms); }
        openConvo(normalized);
        renderContacts(document.getElementById("dm-search").value);
      }

      function init() {
        const me = getMe();
        const layout = document.getElementById("dm-layout");
        const emptyState = document.getElementById("dm-empty-state");

        if (!me) {
          layout.innerHTML = "";
          const gate = document.createElement("div");
          gate.className = "dm-gate";
          gate.innerHTML = '<h2>messages. 😭</h2><p>Sign in to send and receive direct messages.</p><a class="primary-button" href="../signup/" style="margin-top:8px;display:inline-flex;gap:8px;align-items:center;text-decoration:none"><svg aria-hidden="true" viewBox="0 0 24 24" style="width:18px;height:18px"><path d="M5 12h14M13 6l6 6-6 6"/></svg>Sign in</a>';
          layout.append(gate);
          return;
        }

        renderContacts("");

        const search = document.getElementById("dm-search");
        search.addEventListener("input", function() { renderContacts(search.value); });

        document.getElementById("dm-new-btn").addEventListener("click", promptNewMessage);

        document.getElementById("dm-compose-form").addEventListener("submit", function(e) {
          e.preventDefault();
          if (!activeContact) return;
          const input = document.getElementById("dm-compose-input");
          const body = input.value.trim();
          if (!body) return;
          sendMessage(me.handle, activeContact, body);
          input.value = "";
          input.style.height = "auto";
          openConvo(activeContact);
        });

        const textarea = document.getElementById("dm-compose-input");
        textarea.addEventListener("keydown", function(e) {
          if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            document.getElementById("dm-compose-form").dispatchEvent(new Event("submit"));
          }
        });
        textarea.addEventListener("input", function() {
          this.style.height = "auto";
          this.style.height = Math.min(this.scrollHeight, 120) + "px";
        });

        const dms = getDMs();
        const myHandle = normalizeHandle(me.handle);
        const hasConvos = Object.keys(dms).some(function(k) { return k.includes(myHandle); });
        const knownUsers = getKnownUsers();
        if (hasConvos && knownUsers.length) {
          openConvo(knownUsers[0]);
        }

        updateAdminNav();
      }

      async function updateAdminNav() {
        const me = getMe();
        if (!me?.email) return;
        try {
          const res = await fetch("/api/is-admin", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({ email: me.email }) });
          const data = await res.json();
          if (data.admin) {
            document.querySelectorAll('a[href="../admin/"]').forEach(function(a) { a.hidden = false; });
          }
          const joinBtn = document.querySelector(".join-button");
          if (joinBtn) { joinBtn.textContent = me.handle; joinBtn.href = "../#profiles"; }
        } catch {}
      }

      init();
    </script>
  </body>
</html>
