<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="coming son inbox.">
    <title>Inbox - coming son.</title>
    <link rel="icon" href="../assets/logo.webp">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@500;600;700;800;900&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css?v=shared-trades-clean-ui-v6">
    <style>
      .inbox-tabs { display:flex; gap:0; border-bottom:2px solid var(--border); margin-bottom:20px; }
      .inbox-tab-btn {
        background:none; border:none; border-bottom:2px solid transparent; margin-bottom:-2px;
        padding:12px 24px; font-size:15px; font-weight:700; color:var(--ink-soft);
        cursor:pointer; font-family:inherit; transition:color .15s,border-color .15s;
      }
      .inbox-tab-btn.is-active { color:var(--ink); border-bottom-color:#cbff49; }
      .inbox-tab-btn:hover { color:var(--ink); }
      .dm-layout { display:grid; grid-template-columns:260px 1fr; gap:0; min-height:440px; border:1px solid var(--border); border-radius:12px; overflow:hidden; }
      .dm-sidebar { border-right:1px solid var(--border); background:var(--paper); display:flex; flex-direction:column; }
      .dm-sidebar-head { padding:16px 16px 12px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
      .dm-sidebar-head h3 { margin:0; font-size:15px; font-weight:800; }
      .dm-new-btn { background:var(--inverse); color:var(--paper); border:none; border-radius:6px; padding:6px 12px; font-size:12px; font-weight:700; cursor:pointer; }
      .dm-new-btn:hover { opacity:.85; }
      .dm-convo-list { flex:1; overflow-y:auto; padding:8px 0; }
      .dm-convo-item {
        display:flex; flex-direction:column; gap:3px; padding:12px 16px;
        cursor:pointer; border:none; background:none; width:100%; text-align:left;
        color:var(--ink); border-bottom:1px solid var(--border); transition:background .1s;
      }
      .dm-convo-item:hover, .dm-convo-item.is-active { background:rgba(203,255,73,.12); }
      .dm-convo-item strong { font-size:14px; font-weight:700; }
      .dm-convo-item span { font-size:12px; color:var(--ink-soft); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
      .dm-thread-area { flex:1; display:flex; flex-direction:column; background:var(--paper-soft); }
      .dm-thread-empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; color:var(--ink-soft); padding:40px; text-align:center; }
      .dm-thread-empty span { font-size:40px; }
      .dm-thread-head { padding:16px 20px; border-bottom:1px solid var(--border); background:var(--paper); display:flex; align-items:center; gap:10px; }
      .dm-thread-head h3 { margin:0; font-size:15px; font-weight:800; }
      .dm-msg-list { flex:1; overflow-y:auto; padding:16px 20px; display:flex; flex-direction:column; gap:8px; max-height:340px; }
      .dm-msg-bubble { max-width:75%; padding:10px 14px; border-radius:12px; font-size:14px; line-height:1.4; word-break:break-word; }
      .dm-msg-bubble.is-mine { margin-left:auto; background:#cbff49; color:#0a2138; border-bottom-right-radius:3px; }
      .dm-msg-bubble.is-theirs { background:var(--paper); border:1px solid var(--border); color:var(--ink); border-bottom-left-radius:3px; }
      .dm-msg-meta { font-size:11px; color:var(--ink-soft); margin-top:2px; padding:0 4px; }
      .dm-msg-mine-wrap { display:flex; flex-direction:column; align-items:flex-end; }
      .dm-msg-theirs-wrap { display:flex; flex-direction:column; align-items:flex-start; }
      .dm-compose { padding:14px 20px; border-top:1px solid var(--border); background:var(--paper); display:flex; gap:8px; align-items:flex-end; }
      .dm-compose-input { flex:1; resize:none; padding:10px 12px; border:1px solid var(--border); border-radius:8px; font-size:14px; min-height:40px; max-height:100px; color:var(--ink); background:var(--paper-soft); font-family:inherit; }
      .dm-compose-input:focus { outline:2px solid var(--ink); outline-offset:-1px; }
      .dm-compose-btn { background:var(--inverse); color:var(--paper); border:none; border-radius:8px; padding:10px 18px; font-weight:700; font-size:14px; cursor:pointer; flex:0 0 auto; }
      .dm-compose-btn:hover { opacity:.85; }
      @media (max-width:640px) {
        .dm-layout { grid-template-columns:1fr; }
        .dm-sidebar { border-right:none; border-bottom:1px solid var(--border); max-height:180px; }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="../" aria-label="coming son home">
        <span class="brand-mark" aria-hidden="true">
          <img src="../assets/logo.webp" alt="logo" style="width:42px;height:42px;object-fit:cover;border-radius:8px;">
        </span>
        <span>coming son.</span>
      </a>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="../#submit">Submit</a>
        <a href="../trading/">Trading</a>
        <a href="../inbox/" aria-current="page">Inbox</a>
        <a href="../gallery/">Gallery</a>
        <a href="../forums/">Forums</a>
        <a href="../admin/" hidden>Admin</a>
        <a href="../search/">Search</a>
      </nav>
      <a class="join-button" href="../signup/">Sign up <span class="inbox-badge nav-badge" hidden>0</span></a>
    </header>

    <main id="top">
      <section class="trading-section page-section" aria-labelledby="inbox-title">
        <div class="section-heading">
          <div>
            <h1 class="page-title" id="inbox-title">inbox. 😭</h1>
            <p>notifications and direct messages. 😭</p>
          </div>
        </div>

        <article class="account-card notifications-card">
          <nav class="inbox-tabs" aria-label="Inbox sections">
            <button class="inbox-tab-btn is-active" data-tab="notif-panel" type="button">Notifications.</button>
            <button class="inbox-tab-btn" data-tab="dm-panel" type="button">Messages. <span class="inbox-badge" hidden>0</span></button>
          </nav>

          <!-- Notifications panel -->
          <div id="notif-panel">
            <div class="notification-list" id="notification-list" aria-live="polite"></div>
          </div>

          <!-- DM panel -->
          <div id="dm-panel" hidden>
            <div class="dm-layout">
              <aside class="dm-sidebar">
                <div class="dm-sidebar-head">
                  <h3>conversations.</h3>
                  <button class="dm-new-btn" id="dm-new-btn" type="button">+ New</button>
                </div>
                <div class="dm-convo-list" id="dm-convo-list"></div>
              </aside>
              <div class="dm-thread-area" id="dm-thread-area">
                <div class="dm-thread-empty" id="dm-thread-empty">
                  <span>💬</span>
                  <p>pick a conversation or start a new one. 😭</p>
                </div>
                <div id="dm-thread-view" style="display:none;flex-direction:column;flex:1">
                  <div class="dm-thread-head">
                    <div>
                      <h3 id="dm-thread-name"></h3>
                    </div>
                  </div>
                  <div class="dm-msg-list" id="dm-msg-list"></div>
                  <form class="dm-compose" id="dm-compose-form">
                    <textarea class="dm-compose-input" id="dm-compose-input" placeholder="Type a message..." rows="1" maxlength="500"></textarea>
                    <button class="dm-compose-btn" type="submit">Send.</button>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </article>
      </section>
    </main>

    <footer class="site-footer">
      <div>
        <strong>coming son.</strong>
        <p>son. emojis cry</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../config.js"></script>
    <script src="../backend.js"></script>
    <script src="../script.js?v=shared-trades-clean-ui-v6"></script>
    <script>
      // ---- Inbox tab switching ----
      var activeConvo = null;

      document.querySelectorAll(".inbox-tab-btn[data-tab]").forEach(function(btn) {
        btn.addEventListener("click", function() {
          document.querySelectorAll(".inbox-tab-btn[data-tab]").forEach(function(b) { b.classList.remove("is-active"); });
          btn.classList.add("is-active");
          var target = btn.dataset.tab;
          document.getElementById("notif-panel").hidden = target !== "notif-panel";
          document.getElementById("dm-panel").hidden = target !== "dm-panel";
          if (target === "dm-panel") renderInboxDMs();
        });
      });

      // ---- DM helpers ----
      function getMe() {
        try { return JSON.parse(localStorage.getItem("son-meme-exchange-current-user")); } catch(e) { return null; }
      }
      function getAllDMs() {
        try { return JSON.parse(localStorage.getItem("son-meme-exchange-direct-messages")) || []; } catch(e) { return []; }
      }
      function saveAllDMs(dms) { localStorage.setItem("son-meme-exchange-direct-messages", JSON.stringify(dms)); }

      function getOrMakeDM(myH, other) {
        var parts = [myH.toLowerCase(), other.toLowerCase()].sort();
        var dms = getAllDMs();
        var dm = dms.find(function(d) { return d.participants[0] === parts[0] && d.participants[1] === parts[1]; });
        if (!dm) {
          dm = { id: "dm-" + Date.now(), participants: parts, messages: [], createdAt: Date.now() };
          dms.push(dm); saveAllDMs(dms);
        }
        return dm;
      }

      function sendInboxDM(other, body) {
        var me = getMe(); if (!me) return;
        var parts = [me.handle.toLowerCase(), other.toLowerCase()].sort();
        var dms = getAllDMs();
        var idx = dms.findIndex(function(d) { return d.participants[0] === parts[0] && d.participants[1] === parts[1]; });
        var dm = idx >= 0 ? dms[idx] : { id: "dm-" + Date.now(), participants: parts, messages: [], createdAt: Date.now() };
        dm.messages.push({ id: "msg-" + Date.now(), from: me.handle, body: body.trim(), createdAt: Date.now() });
        if (idx >= 0) dms[idx] = dm; else dms.push(dm);
        saveAllDMs(dms);
      }

      function renderInboxDMs() {
        var me = getMe();
        var list = document.getElementById("dm-convo-list");
        if (!me) {
          list.innerHTML = '<p style="padding:16px;font-size:13px;color:var(--ink-soft)">Sign in to see messages.</p>';
          return;
        }
        var myH = me.handle.toLowerCase();
        var dms = getAllDMs().filter(function(d) { return d.participants.includes(myH); })
          .sort(function(a, b) {
            var la = (a.messages[a.messages.length - 1] || a).createdAt;
            var lb = (b.messages[b.messages.length - 1] || b).createdAt;
            return lb - la;
          });
        list.innerHTML = "";
        if (!dms.length) {
          list.innerHTML = '<p style="padding:16px;font-size:13px;color:var(--ink-soft)">No conversations yet. Start one!</p>';
          return;
        }
        dms.forEach(function(dm) {
          var other = dm.participants.find(function(p) { return p !== myH; }) || dm.participants[0];
          var last = dm.messages[dm.messages.length - 1];
          var preview = last ? (last.from.toLowerCase() === myH ? "You: " : "") + last.body.slice(0, 50) : "No messages yet";
          var btn = document.createElement("button");
          btn.className = "dm-convo-item" + (activeConvo === other ? " is-active" : "");
          btn.type = "button";
          btn.innerHTML = "<strong>" + other + "</strong><span>" + preview + "</span>";
          btn.addEventListener("click", function() { openInboxThread(other); });
          list.appendChild(btn);
        });
      }

      function openInboxThread(other) {
        var me = getMe(); if (!me) return;
        activeConvo = other;
        var myH = me.handle.toLowerCase();
        var dm = getOrMakeDM(me.handle, other);

        document.getElementById("dm-thread-empty").style.display = "none";
        var view = document.getElementById("dm-thread-view");
        view.style.display = "flex";
        document.getElementById("dm-thread-name").textContent = other;

        var msgList = document.getElementById("dm-msg-list");
        msgList.innerHTML = "";
        dm.messages.forEach(function(m) {
          var isMine = m.from.toLowerCase() === myH;
          var wrap = document.createElement("div");
          wrap.className = isMine ? "dm-msg-mine-wrap" : "dm-msg-theirs-wrap";
          var bubble = document.createElement("div");
          bubble.className = "dm-msg-bubble " + (isMine ? "is-mine" : "is-theirs");
          bubble.textContent = m.body;
          var meta = document.createElement("div");
          meta.className = "dm-msg-meta";
          meta.textContent = new Date(m.ts || m.createdAt).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
          wrap.appendChild(bubble); wrap.appendChild(meta);
          msgList.appendChild(wrap);
        });
        msgList.scrollTop = msgList.scrollHeight;

        renderInboxDMs();
        document.getElementById("dm-compose-input").focus();
      }

      document.getElementById("dm-compose-form").addEventListener("submit", function(e) {
        e.preventDefault();
        var me = getMe(); if (!me || !activeConvo) return;
        var input = document.getElementById("dm-compose-input");
        var body = input.value.trim(); if (!body) return;
        sendInboxDM(activeConvo, body);
        input.value = "";
        openInboxThread(activeConvo);
      });

      document.getElementById("dm-compose-input").addEventListener("keydown", function(e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          document.getElementById("dm-compose-form").dispatchEvent(new Event("submit"));
        }
      });

      document.getElementById("dm-new-btn").addEventListener("click", function() {
        var me = getMe();
        if (!me) { alert("Sign in first to send messages."); return; }
        var handle = prompt("Enter the @handle to message:");
        if (!handle) return;
        var other = handle.replace(/^@+/, "").toLowerCase();
        if (other === me.handle.replace(/^@+/, "").toLowerCase()) { alert("Can't message yourself!"); return; }
        getOrMakeDM(me.handle, other);
        renderInboxDMs();
        openInboxThread(other);
      });

      // Auto-open DM from URL param ?dm=@handle
      (function() {
        var params = new URLSearchParams(window.location.search);
        var dm = params.get("dm");
        if (dm) {
          var dmTabBtn = document.querySelector('.inbox-tab-btn[data-tab="dm-panel"]');
          if (dmTabBtn) dmTabBtn.click();
          setTimeout(function() { openInboxThread(dm.replace(/^@+/, "").toLowerCase()); }, 100);
        }
      })();
    </script>
  </body>
</html>
